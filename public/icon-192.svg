<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="32" fill="#1e1e2e"/>
  <!-- 2x2 grid of operation circles, centered -->
  <!-- + green (top-left) -->
  <circle cx="72" cy="72" r="28" fill="#a6e3a1"/>
  <text x="72" y="81" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#11111b" text-anchor="middle">+</text>
  <!-- - red (top-right) -->
  <circle cx="120" cy="72" r="28" fill="#f38ba8"/>
  <text x="120" y="81" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#11111b" text-anchor="middle">&#8722;</text>
  <!-- x blue (bottom-left) -->
  <circle cx="72" cy="120" r="28" fill="#89b4fa"/>
  <text x="72" y="129" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#11111b" text-anchor="middle">&#215;</text>
  <!-- / orange (bottom-right) -->
  <circle cx="120" cy="120" r="28" fill="#fab387"/>
  <text x="120" y="129" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#11111b" text-anchor="middle">&#247;</text>
</svg>
